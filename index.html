.metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;border-top:1px solid var(--line);margin-top:22px;padding-top:17px}.metric{background:#f2ebe2;border:1px solid #ded1c2;border-radius:4px;padding:13px 12px;min-height:76px}.metric b{display:block;font:700 25px/1 var(--serif);color:#3b332d;margin-bottom:7px}.metric span{font-size:12px;font-weight:700;color:#675e56}[data-theme=dark] .metric{background:#37322d;border-color:#4f463e}[data-theme=dark] .metric b,[data-theme=dark] .metric span{color:var(--ink)}
.modalback{position:fixed;inset:0;background:#171411aa;z-index:100;display:grid;place-items:center;padding:20px}.modal{width:min(900px,96vw);max-height:92vh;overflow:auto;background:var(--card);border-radius:6px;box-shadow:0 30px 80px #0008}
.modalhead,.modalfoot{padding:18px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}.modalhead h2{margin:0;font:700 26px var(--serif)}.modalhead button{margin-left:auto}.modalbody{padding:22px}.modalfoot{border-top:1px solid var(--line);border-bottom:0}.formgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.field.span2{grid-column:span 2}.field.span3{grid-column:span 3}.field label{color:var(--muted)}
.toast{position:fixed;right:24px;bottom:24px;z-index:200;background:var(--dark);color:#fff;padding:13px 17px;border-radius:4px;box-shadow:0 12px 30px #0005}
.gate{position:fixed;inset:0;z-index:500;display:grid;place-items:center;padding:22px;background:linear-gradient(115deg,#201812e6,#2f2822cc),var(--planner-bg-image,linear-gradient(135deg,#efe6dc,#d6c6b4));background-size:cover;background-position:center}.gate-card{width:min(460px,92vw);background:#fff8efd9;border:1px solid #eadccc;border-radius:9px;padding:34px;box-shadow:0 28px 85px #0007;text-align:center;backdrop-filter:blur(5px)}.gate-card h1{font:700 36px/1 var(--serif);margin:0 0 8px}.gate-card p{color:var(--muted);margin:0 0 20px}.gate-card input{text-align:center;font-size:20px;letter-spacing:.16em}.gate-card .btn{width:100%;margin-top:12px}.gate-error{min-height:20px;margin-top:10px;color:#9b3d34;font-weight:800;font-size:12px}

async function uploadShelfPhoto(key,index,file){if(!file)return;let photos=[...(DB.settings.shelfPhotos[key]||[])];photos[index]=await fileData(file,500);DB.settings.shelfPhotos[key]=photos.slice(0,4);save();renderSettings();toast("Shelf photo added")}
function removeShelfPhoto(key,index){let photos=[...(DB.settings.shelfPhotos[key]||[])];photos[index]="";DB.settings.shelfPhotos[key]=photos;save();renderSettings()}
function editBook(id,status){if(!id&&DB.books.length>=MAX_BOOKS){alert(`PageTurn supports up to ${MAX_BOOKS} books. Export a backup or remove books before adding more.`);return}let b=id?DB.books.find(x=>x.id===id):normalize({status:status||"reading"}),fresh=!id;$("#modalRoot").innerHTML=`<div class="modalback" id="modalback"><div class="modal"><div class="modalhead"><h2>${fresh?"Add a Book":"Edit Book"}</h2><button class="icon" onclick="closeModal()">×</button></div><form id="bookForm"><div class="modalbody"><div class="formgrid">
 ${field("Title","title",b.title,"text","span2")}${field("Author","author",b.author)}${statusField(b.status)}${selectField("Genre","genre",GENRES,b.genre)}${selectField("Format","format",FORMATS,b.format)}
 ${field("Rating","rating",b.rating||"","number")}${field("Pages read","pagesRead",b.pagesRead??"","number")}${field("Total pages","totalPages",b.totalPages??"","number")}
 ${field("Date started","dateStarted",b.dateStarted,"date")}${field("Date finished","dateFinished",b.dateFinished,"date")}${field("Publication year","publicationYear",b.publicationYear??"","number")}
 ${field("Series","seriesName",b.seriesName)}${field("Series number","seriesNumber",b.seriesNumber??"","number")}${field("Series total","seriesTotalBooks",b.seriesTotalBooks??"","number")}
 ${selectField("Ownership","ownership",["owned","borrowed","library","subscription"],b.ownership)}${field("Stored at / Location","location",b.location)}${field("Source","source",b.source||b.recommendedBy)}
 ${field("Cover image URL","coverUrl",b.coverUrl,"url","span3")}
 <div class="field span3"><label>Upload Cover Artwork</label><input type="file" name="coverFile" accept="image/*"><span class="sub">Uploaded artwork is saved inside PageTurn for offline display.</span></div>
 ${field("Priority","priority",b.priority)}${field("Estimated price (FOR WISHLIST)","estPrice",b.estPrice??"","number")}${field("Book Cost","costPaid",b.costPaid??"","number")}
 ${field("Tags","tags",b.tags,"text","span3")}${area("Favorite quote","favouriteQuote",b.favouriteQuote)}${area("Notes","notes",b.notes)}
 <label style="display:flex;align-items:center;gap:8px"><input style="width:auto" type="checkbox" name="favouriteOfYear" ${b.favouriteOfYear?"checked":""}> Favorite of the year</label>
 </div></div><div class="modalfoot"><button class="btn primary" type="submit">Save book</button><button class="btn" type="button" onclick="closeModal()">Cancel</button>${fresh?"":`<button class="btn" type="button" style="margin-left:auto;color:#a34d45" onclick="deleteBook('${b.id}')">Delete</button>`}</div></form></div></div>`;
 $("#bookForm").onsubmit=async e=>{e.preventDefault();let fd=new FormData(e.target),o={};for(const [k,v] of fd)if(k!=="coverFile")o[k]=v;["rating","pagesRead","totalPages","publicationYear","seriesNumber","seriesTotalBooks","estPrice","costPaid"].forEach(k=>o[k]=o[k]===""?null:Number(o[k]));o.favouriteOfYear=fd.has("favouriteOfYear");let file=fd.get("coverFile");if(file&&file.size)o.coverUrl=await fileData(file);Object.assign(b,o);if(fresh)DB.books.push(b);save();closeModal();toast(fresh?"Book added":"Book updated");render()};$("#modalback").onclick=e=>{if(e.target.id==="modalback")closeModal()}}
function field(l,n,v,t="text",c=""){return `<div class="field ${c}"><label>${l}</label><input name="${n}" type="${t}" value="${esc(v)}"${n==="rating"?' min="0" max="5" step=".5"':""}${["estPrice","costPaid"].includes(n)?' step=".01"':""}></div>`}
function selectField(l,n,a,v){return `<div class="field"><label>${l}</label><select name="${n}">${a.map(x=>`<option value="${esc(x)}" ${x===v?"selected":""}>${esc(x)}</option>`).join("")}</select></div>`}
function statusField(v){return `<div class="field"><label>Status</label><select name="status">${STATUSES.map(x=>`<option value="${x}" ${x===v?"selected":""}>${STATUS_LABEL[x]}</option>`).join("")}</select><span class="sub">Did Not Finish means you stopped reading before completion.</span></div>`}
function area(l,n,v){return `<div class="field span3"><label>${l}</label><textarea name="${n}" rows="3">${esc(v)}</textarea></div>`}
function closeModal(){$("#modalRoot").innerHTML=""}function deleteBook(id){if(confirm("Delete this book?")){DB.books=DB.books.filter(b=>b.id!==id);save();closeModal();render();toast("Book deleted")}}
function exportData(){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}));a.download=`pageturn-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href)}
function exportCatalogueCSV(){let fields=["title","author","seriesName","seriesNumber","seriesTotalBooks","seriesContinue","genre","status","rating","dateStarted","dateFinished","pagesRead","totalPages","format","publicationYear","originalLanguage","countryOfOrigin","recommendedBy","source","favoriteQuote","notes","coverUrl","costPaid","estPrice","priority","favouriteOfYear","ownership","location","tags","customShelf","rereads"];let labels=["Title","Author","Series","Series Number","Series Total Books","Series Continue","Genre","Status","Rating","Date Started","Date Finished","Pages Read","Total Pages","Format","Publication Year","Original Language","Country of Origin","Recommended By","Source","Favorite Quote","Notes","Cover URL","Book Cost","Estimated Price (FOR WISHLIST)","Priority","Favorite of Year","Ownership","Stored At / Location","Tags","Custom Shelf (legacy)","Rereads"];let csv=s=>`"${String(s??"").replace(/"/g,'""')}"`,rows=[labels.map(csv).join(",")];DB.books.forEach(b=>rows.push(fields.map(f=>csv(f==="favoriteQuote"?b.favouriteQuote:b[f])).join(",")));let a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\ufeff"+rows.join("\n")],{type:"text/csv;charset=utf-8"}));a.download=`pageturn-catalogue-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href);toast("Catalogue CSV exported")}
function toggleSidebar(){if(matchMedia("(max-width:850px)").matches){$("#side").classList.toggle("open");return}DB.settings.sidebarCollapsed=!DB.settings.sidebarCollapsed;save();applySidebarState()}
function initAccessGate(){let gate=$("#accessGate"),form=$("#gateForm"),input=$("#gatePassword"),err=$("#gateError");if(!gate||!form)return;if(sessionStorage.getItem("pageturn_access")===ACCESS_PASSWORD){gate.classList.add("hidden");return}gate.classList.remove("hidden");setTimeout(()=>input?.focus(),50);form.onsubmit=e=>{e.preventDefault();if((input.value||"").trim()===ACCESS_PASSWORD){sessionStorage.setItem("pageturn_access",ACCESS_PASSWORD);gate.classList.add("hidden");err.textContent="";return}err.textContent="Incorrect password. Please try again.";input.select()}}
$("#themeBtn").onclick=()=>{DB.settings.theme=DB.settings.theme==="dark"?"light":"dark";save();setTheme();if(active==="settings")renderSettings()};$("#exportBtn").onclick=exportData;$("#importBtn").onclick=()=>$("#importFile").click();$("#importFile").onchange=e=>{let r=new FileReader;r.onload=()=>{try{let d=JSON.parse(r.result);if(!Array.isArray(d.books))throw 0;DB=d;DB.books=DB.books.map(normalize);save();setTheme();render();toast("Backup imported")}catch(x){alert("This is not a valid PageTurn backup.")}};r.readAsText(e.target.files[0])};$("#menuBtn").onclick=toggleSidebar;
load();setTheme();const requestedTab=new URLSearchParams(location.search).get("tab");active=TABS.some(x=>x[0]===requestedTab)?requestedTab:(TABS.some(x=>x[0]===DB.settings.defaultTab)?DB.settings.defaultTab:"cover");buildNav();render();initAccessGate();
</script>
</body>
</html>
